<script>
// ============================================
// ANTI COPY & PROTECTION SYSTEM
// ============================================

(function() {
    'use strict';
    
    // 1. CEK APAKAH INSPECT ELEMENT TERBUKA (DEVELOPER TOOLS)
    function detectDevTools() {
        const threshold = 160; // threshold lebar devtools
        const widthThreshold = window.outerWidth - window.innerWidth > threshold;
        const heightThreshold = window.outerHeight - window.innerHeight > threshold;
        
        if (widthThreshold || heightThreshold) {
            // Redirect atau kosongkan halaman jika devtools terbuka
            document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#000;color:#fff;text-align:center;padding:20px;"><h2>🔒 Developer Tools Detected</h2><p>Please close developer tools to continue.</p></div>';
            console.clear();
        }
    }
    
    // Deteksi devtools setiap 2 detik
    setInterval(detectDevTools, 2000);
    
    // 2. CEK APAKAH CONSOLE DIGUNAKAN (Override console.log)
    const originalConsoleLog = console.log;
    const originalConsoleWarn = console.warn;
    const originalConsoleError = console.error;
    
    console.log = function() {};
    console.warn = function() {};
    console.error = function() {};
    
    // 3. BLOKIR SEMUA SHORTCUT KEYBOARD BERBAHAYA
    document.addEventListener('keydown', function(e) {
        // Daftar shortcut yang diblokir
        const blockedKeys = [
            // Copy, Cut, Paste
            { ctrl: true, key: 'c' },
            { ctrl: true, key: 'C' },
            { ctrl: true, key: 'x' },
            { ctrl: true, key: 'X' },
            { ctrl: true, key: 'v' },
            { ctrl: true, key: 'V' },
            // Save
            { ctrl: true, key: 's' },
            { ctrl: true, key: 'S' },
            // View source
            { ctrl: true, key: 'u' },
            { ctrl: true, key: 'U' },
            // DevTools F12
            { key: 'F12' },
            // Inspect (Ctrl+Shift+I)
            { ctrl: true, shift: true, key: 'I' },
            { ctrl: true, shift: true, key: 'i' },
            // Javascript Console (Ctrl+Shift+J)
            { ctrl: true, shift: true, key: 'J' },
            { ctrl: true, shift: true, key: 'j' },
            // Refresh (Ctrl+F5, Ctrl+R) - optional, hapus jika ingin tetap bisa refresh
            { ctrl: true, key: 'r' },
            { ctrl: true, key: 'R' },
            { ctrl: true, key: 'F5' }
        ];
        
        for (let block of blockedKeys) {
            const ctrlMatch = !block.ctrl || (block.ctrl && e.ctrlKey);
            const shiftMatch = !block.shift || (block.shift && e.shiftKey);
            const keyMatch = e.key === block.key;
            
            if (ctrlMatch && shiftMatch && keyMatch) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }
        }
        
        // Blokir juga jika menekan F12
        if (e.key === 'F12') {
            e.preventDefault();
            return false;
        }
        
        // Blokir context menu key (biasanya Shift+F10 atau Menu key)
        if (e.key === 'ContextMenu' || (e.shiftKey && e.key === 'F10')) {
            e.preventDefault();
            return false;
        }
    });
    
    // 4. BLOKIR KLIK KANAN
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
    });
    
    // 5. BLOKIR DRAG & DROP (Menyeret teks/gambar)
    document.addEventListener('dragstart', function(e) {
        e.preventDefault();
        return false;
    });
    
    // 6. BLOKIR SELECTION (Seleksi teks)
    document.addEventListener('selectstart', function(e) {
        // Ijinkan seleksi di input field dan textarea (karena chat membutuhkan)
        const target = e.target;
        if (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.isContentEditable) {
            return true;
        }
        e.preventDefault();
        return false;
    });
    
    // 7. BLOKIR COPY DENGAN JQUERY ATAU EVENT LAINNYA
    document.addEventListener('copy', function(e) {
        // Ijinkan copy di input field chat
        const target = e.target;
        if (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA') {
            return true;
        }
        e.preventDefault();
        e.clipboardData.setData('text/plain', '🔒 Copying is disabled on this website.');
        return false;
    });
    
    // 8. BLOKIR CUT
    document.addEventListener('cut', function(e) {
        const target = e.target;
        if (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA') {
            return true;
        }
        e.preventDefault();
        return false;
    });
    
    // 9. BLOKIR PASTE DI LUAR INPUT FIELD
    document.addEventListener('paste', function(e) {
        const target = e.target;
        if (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA') {
            return true;
        }
        e.preventDefault();
        return false;
    });
    
    // 10. CEK JIKA USER MENCUBA MEMBUKA VIEW SOURCE (Ctrl+U)
    // Ini sudah ditangani oleh keydown di atas
    
    // 11. NONAKTIFKAN SELECTION PADA CSS (Sebagai lapisan tambahan)
    const style = document.createElement('style');
    style.innerHTML = `
        body {
            -webkit-user-select: none !important;
            -moz-user-select: none !important;
            -ms-user-select: none !important;
            user-select: none !important;
        }
        input, textarea {
            -webkit-user-select: text !important;
            -moz-user-select: text !important;
            -ms-user-select: text !important;
            user-select: text !important;
        }
    `;
    document.head.appendChild(style);
    
    // 12. DETEKSI JIKA USER MEMBUKA DEVTOOLS DENGAN METODE LAIN
    let devtoolsOpened = false;
    
    function checkDevTools() {
        const element = new Image();
        Object.defineProperty(element, 'id', {
            get: function() {
                devtoolsOpened = true;
                // Redirect atau bersihkan konten
                document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#000;color:#fff;text-align:center;padding:20px;"><h2>🔒 Developer Tools Detected</h2><p>Please close developer tools to continue.</p></div>';
                throw new Error('DevTools detected');
            }
        });
        console.log('%c', element);
    }
    
    setInterval(checkDevTools, 1000);
    
    // 13. BLOKIR AKSES KE MENU VIEW SOURCE DENGAN CACHE BUSTING
    // Tidak bisa 100% memblokir karena browser tetap punya menu, tapi kita blokir shortcut
    
    // 14. TAMBAHKAN PROTECTION UNTUK IFRAME ATAU FRAME BREAKING
    if (window.self !== window.top) {
        window.top.location = window.self.location;
    }
    
    // 15. NONAKTIFKAN PRINT (Karena print bisa digunakan untuk menyimpan konten)
    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
            e.preventDefault();
            alert('Printing is disabled on this website.');
            return false;
        }
    });
    
    // 16. OVERRIDE FUNCTION UNTUK MEMBUKA INSPECTOR
    window.addEventListener('devtoolschange', function() {});
    
    // 17. NONAKTIFKAN MEDIA KEYS YANG BISA DIGUNAKAN UNTUK MENYIMPAN
    document.addEventListener('keydown', function(e) {
        // Print Screen (PrtSc)
        if (e.key === 'PrintScreen') {
            e.preventDefault();
            alert('Screenshots are disabled on this website.');
            return false;
        }
    });
    
    console.log('🔒 Anti-copy protection enabled');
})();
</script>

<script>
// Supabase Config
const SUPABASE_URL = 'https://ubunrqqusegotncuknch.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ozNk5Y7Ng4iWQjQBXPLADw_TV4cDvXf';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { realtime: { params: { eventsPerSecond: 10 } } });

let currentUser = null, selectedUser = null, messagesChannel = null, profilesChannel = null, selectedFile = null;
const EMOJIS = ['😀','😃','😄','😁','😆','😅','😂','🤣','😊','😇','🙂','🙃','😉','😌','😍','🥰','😘','😗','😙','😚','😋','😛','😝','😜','🤪','🤨','🧐','🤓','😎','🤩','🥳','😏','😒','😞','😔','😟','😕','🙁','☹️','😣','😖','😫','😩','🥺','😢','😭','😤','😠','😡','🤬','🤯','😳','🥵','🥶','😱','😨','😰','😥','😓','🤗','🤔','🤭','🤫','🤥','😶','😐','😑','😬','🙄','😯','😦','😧','😮','😲','🥱','😴','🤤','😪','😵','❤️','💔','💕','💞','💓','💗','💖','💘','💝'];

function showToast(msg, type='info'){ let t=document.getElementById('toast'); t.textContent=msg; t.className=`toast ${type}`; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }
function showLoading(show){ document.getElementById('loadingOverlay').style.display=show?'flex':'none'; }
function closeModal(id){ document.getElementById(id).style.display='none'; }
function escapeHtml(t){ if(!t) return ''; let d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

async function initStorage(){ try{ let {data:buckets}=await supabase.storage.listBuckets(); if(!buckets?.some(b=>b.name==='avatars')) await supabase.storage.createBucket('avatars',{public:true,fileSizeLimit:2097152}); }catch(e){} }
async function uploadAvatar(file,userId){ try{ let ext=file.name.split('.').pop(), fileName=`${userId}-${Date.now()}.${ext}`, filePath=`avatars/${fileName}`; let {error}=await supabase.storage.from('avatars').upload(filePath,file,{cacheControl:'3600',upsert:true}); if(error) return null; let {data:{publicUrl}}=supabase.storage.from('avatars').getPublicUrl(filePath); return publicUrl; }catch(e){ return null; } }
function displayAvatar(url,textEl,imgEl,def){ if(url&&url!=='null'&&url!==''){ imgEl.src=url; imgEl.style.display='block'; textEl.style.display='none'; }else{ textEl.textContent=def||'U'; textEl.style.display='flex'; imgEl.style.display='none'; } }

async function checkSession(){ showLoading(true); let {data:{session}}=await supabase.auth.getSession(); if(session){ await loadCurrentUser(session.user); await initStorage(); showChatApp(); await loadUsers(); setupRealtimeProfiles(); }else showAuthPage(); showLoading(false); }
async function loadCurrentUser(user){ let {data,error}=await supabase.from('profiles').select('*').eq('id',user.id).single(); if(error&&error.code==='PGRST116'){ let {data:newProfile}=await supabase.from('profiles').insert([{id:user.id,email:user.email,display_name:user.email.split('@')[0],bio:'Halo! Saya menggunakan NukMessage',is_admin:false,avatar_url:null}]).select().single(); if(newProfile) currentUser=newProfile; }else if(data) currentUser=data; updateProfileUI(); }
function updateProfileUI(){ if(!currentUser) return; let initial=currentUser.display_name?.charAt(0).toUpperCase()||'U'; displayAvatar(currentUser.avatar_url,document.getElementById('userAvatarText'),document.getElementById('userAvatarImg'),initial); document.getElementById('userName').textContent=currentUser.display_name; document.getElementById('userBio').textContent=currentUser.bio||'Tersedia'; document.getElementById('userVerifiedBadge').style.display=currentUser.is_admin?'inline-flex':'none'; }

async function handleLogin(e){ e.preventDefault(); let email=document.getElementById('loginEmail').value, pwd=document.getElementById('loginPassword').value; if(!email||!pwd) return showToast('Isi semua field','error'); showLoading(true); let {error}=await supabase.auth.signInWithPassword({email,password:pwd}); showLoading(false); if(error) showToast(error.message,'error'); else{ showToast('Selamat datang!','success'); checkSession(); } }
async function handleRegister(e){ e.preventDefault(); let email=document.getElementById('registerEmail').value, pwd=document.getElementById('registerPassword').value, name=document.getElementById('registerName').value; if(!email||!pwd||!name) return showToast('Isi semua field','error'); if(pwd.length<6) return showToast('Password min 6 karakter','error'); showLoading(true); let {error}=await supabase.auth.signUp({email,password:pwd,options:{data:{display_name:name,bio:'Halo! Saya menggunakan NukMessage'},emailRedirectTo:window.location.origin}}); showLoading(false); if(error) showToast(error.message,'error'); else{ showToast('Akun dibuat! Silakan login','success'); switchToLogin(); document.getElementById('loginEmail').value=email; } }
async function handleLogout(){ if(messagesChannel) await supabase.removeChannel(messagesChannel); if(profilesChannel) await supabase.removeChannel(profilesChannel); await supabase.auth.signOut(); currentUser=null; selectedUser=null; showAuthPage(); showToast('Logout berhasil','success'); }
function showAuthPage(){ document.getElementById('authPage').style.display='block'; document.getElementById('chatApp').style.display='none'; }
function showChatApp(){ document.getElementById('authPage').style.display='none'; document.getElementById('chatApp').style.display='block'; }
function switchToRegister(){ document.getElementById('loginFormContainer').style.display='none'; document.getElementById('registerFormContainer').style.display='block'; }
function switchToLogin(){ document.getElementById('loginFormContainer').style.display='block'; document.getElementById('registerFormContainer').style.display='none'; }

async function loadUsers(){ let {data,error}=await supabase.from('profiles').select('*').neq('id',currentUser.id).order('display_name'); if(!error) renderUsers(data||[]); }
function renderUsers(users){ let container=document.getElementById('usersList'); container.innerHTML=''; if(users.length===0){ container.innerHTML='<div style="padding:20px;text-align:center;color:#64748b;">Tidak ada pengguna lain</div>'; return; } users.forEach(user=>{ let div=document.createElement('div'); div.className='user-item'; let initial=user.display_name?.charAt(0).toUpperCase()||'U'; div.innerHTML=`<div>${user.avatar_url&&user.avatar_url!=='null'?`<img src="${user.avatar_url}" class="user-avatar-small" style="object-fit:cover;">`:`<div class="user-avatar-small">${initial}</div>`}</div><div style="flex:1;"><div class="user-item-name">${escapeHtml(user.display_name)}${user.is_admin?'<span class="verified-badge"><svg viewBox="0 0 24 24" width="16" height="16"><path d="M11.5283 1.5999C11.7686 1.29437 12.2314 1.29437 12.4717 1.5999L14.2805 3.90051C14.4309 4.09173 14.6818 4.17325 14.9158 4.10693L17.7314 3.3089C18.1054 3.20292 18.4799 3.475 18.4946 3.86338L18.6057 6.78783C18.615 7.03089 18.77 7.24433 18.9984 7.32823L21.7453 8.33761C22.1101 8.47166 22.2532 8.91189 22.0368 9.23478L20.4078 11.666C20.2724 11.8681 20.2724 12.1319 20.4078 12.334L22.0368 14.7652C22.2532 15.0881 22.1101 15.5283 21.7453 15.6624L18.9984 16.6718C18.77 16.7557 18.615 16.9691 18.6057 17.2122L18.4946 20.1366C18.4799 20.525 18.1054 20.7971 17.7314 20.6911L14.9158 19.8931C14.6818 19.8267 14.4309 19.9083 14.2805 20.0995L12.4717 22.4001C12.2314 22.7056 11.7686 22.7056 11.5283 22.4001L9.71949 20.0995C9.56915 19.9083 9.31823 19.8267 9.08421 19.8931L6.26856 20.6911C5.89463 20.7971 5.52014 20.525 5.50539 20.1366L5.39427 17.2122C5.38503 16.9691 5.22996 16.7557 5.00164 16.6718L2.25467 15.6624C1.88986 15.5283 1.74682 15.0881 1.96317 14.7652L3.59221 12.334C3.72761 12.1319 3.72761 11.8681 3.59221 11.666L1.96317 9.23478C1.74682 8.91189 1.88986 8.47166 2.25467 8.33761L5.00165 7.32823C5.22996 7.24433 5.38503 7.03089 5.39427 6.78783L5.50539 3.86338C5.52014 3.475 5.89463 3.20292 6.26857 3.3089L9.08421 4.10693C9.31823 4.17325 9.56915 4.09173 9.71949 3.90051L11.5283 1.5999Z" fill="#1DA1F2"/><path d="M9 12L11 14L15 10" stroke="#fff" stroke-width="1.8"/></svg></span>':''}</div><div style="font-size:12px;color:#64748b;">${escapeHtml(user.bio||'Tidak ada bio')}</div></div>`; div.addEventListener('click',()=>selectUser(user)); container.appendChild(div); }); }

function selectUser(user){ selectedUser=user; let initial=user.display_name?.charAt(0).toUpperCase()||'U'; if(user.avatar_url&&user.avatar_url!=='null'){ document.getElementById('chatAvatarImg').src=user.avatar_url; document.getElementById('chatAvatarImg').style.display='block'; document.getElementById('chatAvatarText').style.display='none'; }else{ document.getElementById('chatAvatarText').textContent=initial; document.getElementById('chatAvatarText').style.display='flex'; document.getElementById('chatAvatarImg').style.display='none'; } document.getElementById('chatName').textContent=user.display_name; document.getElementById('chatBio').textContent=user.bio||'Tidak ada bio'; document.getElementById('chatVerifiedBadge').style.display=user.is_admin?'inline-flex':'none'; loadMessages(); setupRealtimeMessages(); document.getElementById('chatPanel').classList.add('active'); }
function closeChatPanel(){ document.getElementById('chatPanel').classList.remove('active'); if(messagesChannel) supabase.removeChannel(messagesChannel); messagesChannel=null; selectedUser=null; }
async function loadMessages(){ if(!selectedUser) return; let {data}=await supabase.from('messages').select('*').or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${selectedUser.id}),and(sender_id.eq.${selectedUser.id},receiver_id.eq.${currentUser.id})`).order('created_at',{ascending:true}); if(data) renderMessages(data); }
function renderMessages(messages){ let container=document.getElementById('messagesContainer'); container.innerHTML=''; messages.forEach(msg=>{ let isSent=msg.sender_id===currentUser.id; let div=document.createElement('div'); div.className=`message ${isSent?'sent':'received'}`; div.id=`msg-${msg.id}`; let time=new Date(msg.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); div.innerHTML=`<div class="message-bubble">${escapeHtml(msg.content)}${msg.is_edited?' <small style="opacity:0.7;">(edited)</small>':''}</div><div class="message-time">${time}</div>${isSent?`<div class="message-actions"><button onclick="editMessage('${msg.id}','${escapeHtml(msg.content).replace(/'/g,"\\'")}')">Edit</button></div>`:''}`; container.appendChild(div); }); container.scrollTop=container.scrollHeight; }
async function sendMessage(){ let input=document.getElementById('messageInput'), content=input.value.trim(); if(!content||!selectedUser) return; let {error}=await supabase.from('messages').insert([{sender_id:currentUser.id,receiver_id:selectedUser.id,content:content,is_edited:false}]); if(!error){ input.value=''; document.getElementById('emojiPicker').style.display='none'; }else showToast('Gagal kirim','error'); }
window.editMessage=async function(id,currentContent){ let newContent=prompt('Edit pesan Anda:',currentContent); if(!newContent||newContent===currentContent) return; let {error}=await supabase.from('messages').update({content:newContent,is_edited:true,edited_at:new Date()}).eq('id',id); if(error) showToast('Gagal edit','error'); else showToast('Pesan di edit','success'); };
function setupRealtimeProfiles(){ if(profilesChannel) supabase.removeChannel(profilesChannel); profilesChannel=supabase.channel('profiles-changes').on('postgres_changes',{event:'*',schema:'public',table:'profiles'},()=>{ loadUsers(); if(currentUser) loadCurrentUser({id:currentUser.id}); }).subscribe(); }
function setupRealtimeMessages(){ if(messagesChannel) supabase.removeChannel(messagesChannel); if(!selectedUser) return; messagesChannel=supabase.channel(`chat-${currentUser.id}-${selectedUser.id}`).on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},(payload)=>{ if((payload.new.sender_id===selectedUser.id&&payload.new.receiver_id===currentUser.id)||(payload.new.sender_id===currentUser.id&&payload.new.receiver_id===selectedUser.id)) addNewMessage(payload.new); }).on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages'},(payload)=>{ updateExistingMessage(payload.new); }).subscribe(); }
function addNewMessage(msg){ if(document.getElementById(`msg-${msg.id}`)) return; let isSent=msg.sender_id===currentUser.id; let container=document.getElementById('messagesContainer'); let wasAtBottom=container.scrollHeight-container.scrollTop<=container.clientHeight+100; let div=document.createElement('div'); div.className=`message ${isSent?'sent':'received'}`; div.id=`msg-${msg.id}`; let time=new Date(msg.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); div.innerHTML=`<div class="message-bubble">${escapeHtml(msg.content)}${msg.is_edited?' <small style="opacity:0.7;">(edited)</small>':''}</div><div class="message-time">${time}</div>${isSent?`<div class="message-actions"><button onclick="editMessage('${msg.id}','${escapeHtml(msg.content).replace(/'/g,"\\'")}')">Edit</button></div>`:''}`; container.appendChild(div); if(wasAtBottom) container.scrollTop=container.scrollHeight; }
function updateExistingMessage(msg){ let el=document.getElementById(`msg-${msg.id}`); if(el){ let bubble=el.querySelector('.message-bubble'); if(bubble) bubble.innerHTML=`${escapeHtml(msg.content)}${msg.is_edited?' <small style="opacity:0.7;">(edited)</small>':''}`; } }

function openEditProfileModal(){ document.getElementById('editName').value=currentUser.display_name; document.getElementById('editBio').value=currentUser.bio||''; if(currentUser.avatar_url&&currentUser.avatar_url!=='null'&&currentUser.avatar_url!==''){ document.getElementById('editAvatarImg').src=currentUser.avatar_url; document.getElementById('editAvatarImg').style.display='block'; document.getElementById('editAvatarInitial').style.display='none'; }else{ let initial=currentUser.display_name?.charAt(0).toUpperCase()||'U'; document.getElementById('editAvatarInitial').textContent=initial; document.getElementById('editAvatarInitial').style.display='flex'; document.getElementById('editAvatarImg').style.display='none'; } document.getElementById('editProfileModal').style.display='flex'; }
document.getElementById('avatarPreviewClick')?.addEventListener('click',()=>document.getElementById('avatarInput').click());
document.getElementById('avatarInput')?.addEventListener('change',(e)=>{ let file=e.target.files[0]; if(!file) return; if(!file.type.startsWith('image/')) return showToast('Pilih file gambar','error'); if(file.size>2*1024*1024) return showToast('Maksimal 2MB','error'); let reader=new FileReader(); reader.onload=ev=>{ document.getElementById('editAvatarImg').src=ev.target.result; document.getElementById('editAvatarImg').style.display='block'; document.getElementById('editAvatarInitial').style.display='none'; }; reader.readAsDataURL(file); selectedFile=file; });
async function saveProfile(){ let displayName=document.getElementById('editName').value, bio=document.getElementById('editBio').value; if(!displayName) return showToast('Nama wajib diisi','error'); showLoading(true); let avatarUrl=currentUser.avatar_url; if(selectedFile){ let uploaded=await uploadAvatar(selectedFile,currentUser.id); if(uploaded) avatarUrl=uploaded; else{ showLoading(false); return showToast('Gagal upload gambar','error'); } } let {error}=await supabase.from('profiles').update({display_name:displayName,bio:bio,avatar_url:avatarUrl}).eq('id',currentUser.id); if(!error){ currentUser.display_name=displayName; currentUser.bio=bio; currentUser.avatar_url=avatarUrl; updateProfileUI(); closeModal('editProfileModal'); await loadUsers(); if(selectedUser&&selectedUser.id===currentUser.id) selectUser(selectedUser); showToast('Profil diperbarui!','success'); selectedFile=null; }else showToast('Gagal update','error'); showLoading(false); }
function showUserProfileModal(user){ let initial=user.display_name?.charAt(0).toUpperCase()||'U'; if(user.avatar_url&&user.avatar_url!=='null'&&user.avatar_url!==''){ document.getElementById('viewAvatarImg').src=user.avatar_url; document.getElementById('viewAvatarImg').style.display='block'; document.getElementById('viewAvatarInitial').style.display='none'; }else{ document.getElementById('viewAvatarInitial').textContent=initial; document.getElementById('viewAvatarInitial').style.display='flex'; document.getElementById('viewAvatarImg').style.display='none'; } document.getElementById('viewName').textContent=user.display_name; document.getElementById('viewBio').textContent=user.bio||'Belum ada bio'; document.getElementById('viewProfileModal').style.display='flex'; }
function renderEmojiPicker(){ let picker=document.getElementById('emojiPicker'); picker.innerHTML=''; EMOJIS.forEach(emoji=>{ let span=document.createElement('span'); span.textContent=emoji; span.onclick=()=>{ document.getElementById('messageInput').value+=emoji; picker.style.display='none'; document.getElementById('messageInput').focus(); }; picker.appendChild(span); }); }
function toggleEmojiPicker(){ let p=document.getElementById('emojiPicker'); if(p.style.display==='none'){ renderEmojiPicker(); p.style.display='grid'; }else p.style.display='none'; }
function searchUsers(){ let term=document.getElementById('searchInput').value.toLowerCase(); document.querySelectorAll('.user-item').forEach(item=>{ let name=item.querySelector('.user-item-name')?.textContent.toLowerCase()||''; item.style.display=name.includes(term)?'flex':'none'; }); }

document.getElementById('loginForm')?.addEventListener('submit',handleLogin);
document.getElementById('registerForm')?.addEventListener('submit',handleRegister);
document.getElementById('showRegisterBtn')?.addEventListener('click',switchToRegister);
document.getElementById('showLoginBtn')?.addEventListener('click',switchToLogin);
document.getElementById('logoutBtn')?.addEventListener('click',handleLogout);
document.getElementById('sendBtn')?.addEventListener('click',sendMessage);
document.getElementById('messageInput')?.addEventListener('keypress',(e)=>{ if(e.key==='Enter') sendMessage(); });
document.getElementById('searchInput')?.addEventListener('input',searchUsers);
document.getElementById('emojiBtn')?.addEventListener('click',toggleEmojiPicker);
document.getElementById('openProfileBtn')?.addEventListener('click',openEditProfileModal);
document.getElementById('editProfileBtn')?.addEventListener('click',openEditProfileModal);
document.getElementById('saveProfileBtn')?.addEventListener('click',saveProfile);
document.getElementById('viewProfileBtn')?.addEventListener('click',()=>{ if(selectedUser) showUserProfileModal(selectedUser); });
document.getElementById('backBtn')?.addEventListener('click',closeChatPanel);
document.addEventListener('click',(e)=>{ let picker=document.getElementById('emojiPicker'); let btn=document.getElementById('emojiBtn'); if(picker&&!picker.contains(e.target)&&e.target!==btn&&!btn?.contains(e.target)) picker.style.display='none'; });
window.onclick=(e)=>{ if(e.target.classList.contains('modal')) e.target.style.display='none'; };
checkSession();
</script>
